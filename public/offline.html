<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline - Anitium</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 0%, rgba(56, 189, 248, 0.2), transparent 32rem),
          radial-gradient(circle at 90% 12%, rgba(244, 63, 94, 0.15), transparent 28rem),
          #070a12;
        color: #e2e8f0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 460px);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      .mark {
        display: inline-grid;
        width: 64px;
        height: 64px;
        place-items: center;
        margin-bottom: 18px;
        border-radius: 16px;
        background: rgba(56, 189, 248, 0.12);
        color: #7dd3fc;
        font-size: 32px;
        font-weight: 900;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }

      button {
        height: 44px;
        margin-top: 24px;
        padding: 0 20px;
        border: 0;
        border-radius: 10px;
        background: #0ea5e9;
        color: white;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: #38bdf8;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">A</div>
      <h1>You are offline</h1>
      <p>
        Anitium cannot reach the network right now. Cached assets may still open, and the page will
        work again when your connection returns.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
